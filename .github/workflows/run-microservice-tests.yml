name: Run microservice tests

on:
  push:
    branches:
      - 'master'
    paths:
      - 'microservices/csam-scanner/**'
      - '.github/workflows/run-microservice-tests.yml'
  pull_request:
    paths:
      - 'microservices/csam-scanner/**'
      - '.github/workflows/run-microservice-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build csam-scanner image
        run: docker compose build csam-scanner
      - name: Run Python unit tests
        run: >
          docker compose run --no-deps
          --user root
          --name csam-scanner_test
          csam-scanner
          bash -c 'pip install coverage && coverage run -m unittest && coverage xml -o coverage.xml && coverage html -d coverage'
      - name: Copy coverage reports
        if: always()
        run: |
          docker cp csam-scanner_test:/app/coverage.xml ./ 2>/dev/null || true
          docker cp csam-scanner_test:/app/coverage ./ 2>/dev/null || true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage
