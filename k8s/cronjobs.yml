apiVersion: batch/v1
kind: CronJob
metadata:
  name: miniboard-clean-posts
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            run: miniboard-cronjob
        spec:
          containers:
          - name: miniboard-clean-posts
            image: ghcr.io/minilauta/miniboard/app:latest
            imagePullPolicy: Always
            securityContext:
              runAsNonRoot: true
              runAsUser: 82
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            workingDir: /app
            args: ["php", "src/cli.php", "clean:posts"]
            resources:
              requests:
                cpu: 250m
                memory: 128Mi
              # NOTE: adjust limits specifically for your environment
              # limits:
              #   memory: 256Mi
            env:
            - name: PHP_POST_MAX_SIZE
              value: 100M
            - name: PHP_UPLOAD_MAX_FILESIZE
              value: 128M
            - name: MB_TIMEZONE
              value: Europe/Helsinki
            - name: MB_DB_HOST
              value: miniboard-mariadb
            - name: MB_DB_NAME
              value: miniboard_db
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: miniboard-mariadb-user
                  key: USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: miniboard-mariadb-user
                  key: PASSWORD
            - name: REDIS_HOST
              value: miniboard-redis
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: miniboard-redis-auth
                  key: PASSWORD
            - name: CSAM_SCANNER_HOST
              value: miniboard-csam-scanner
            volumeMounts:
            - name: miniboard-app-config
              mountPath: /app/src/common/config.php
              subPath: config.php
          restartPolicy: OnFailure
          volumes:
          - name: miniboard-app-config
            configMap:
              name: miniboard-app-config
              items:
              - key: config.php
                path: config.php

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: miniboard-clean-files
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            run: miniboard-cronjob
        spec:
          securityContext:
            fsGroup: 82
          initContainers:
          - name: fix-permissions
            image: busybox:stable
            command: ['sh', '-c', 'chown -R 82:82 /data']
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
                add: [CHOWN, FOWNER]
            resources:
              requests:
                cpu: 50m
                memory: 32Mi
            volumeMounts:
            - name: miniboard-app-pv
              mountPath: /data
          containers:
          - name: miniboard-clean-files
            image: ghcr.io/minilauta/miniboard/app:latest
            imagePullPolicy: Always
            securityContext:
              runAsNonRoot: true
              runAsUser: 82
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            workingDir: /app
            args: ["php", "src/cli.php", "clean:files"]
            resources:
              requests:
                cpu: 250m
                memory: 128Mi
              # NOTE: adjust limits specifically for your environment
              # limits:
              #   memory: 256Mi
            env:
            - name: PHP_POST_MAX_SIZE
              value: 100M
            - name: PHP_UPLOAD_MAX_FILESIZE
              value: 128M
            - name: MB_TIMEZONE
              value: Europe/Helsinki
            - name: MB_DB_HOST
              value: miniboard-mariadb
            - name: MB_DB_NAME
              value: miniboard_db
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: miniboard-mariadb-user
                  key: USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: miniboard-mariadb-user
                  key: PASSWORD
            - name: REDIS_HOST
              value: miniboard-redis
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: miniboard-redis-auth
                  key: PASSWORD
            - name: CSAM_SCANNER_HOST
              value: miniboard-csam-scanner
            volumeMounts:
            - name: miniboard-app-pv
              mountPath: /app/public/src
            - name: miniboard-app-config
              mountPath: /app/src/common/config.php
              subPath: config.php
          restartPolicy: OnFailure
          volumes:
          - name: miniboard-app-pv
            persistentVolumeClaim:
              claimName: miniboard-app-pv-claim
          - name: miniboard-app-config
            configMap:
              name: miniboard-app-config
              items:
              - key: config.php
                path: config.php

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: miniboard-clean-trashbin
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            fsGroup: 82
          containers:
          - name: miniboard-clean-trashbin
            image: busybox:stable
            securityContext:
              runAsNonRoot: true
              runAsUser: 82
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            command: ['sh', '-c', 'rm -rf /data/.trashbin && echo "trashbin cleared"']
            resources:
              requests:
                cpu: 100m
                memory: 64Mi
            volumeMounts:
            - name: miniboard-app-pv
              mountPath: /data
          restartPolicy: OnFailure
          volumes:
          - name: miniboard-app-pv
            persistentVolumeClaim:
              claimName: miniboard-app-pv-claim
